<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    
</head>

<body>
   
<p id="Counting_to_Ten"></p>
<button onclick="count_to_ten()">Click to Count to Ten</button>

<script>
    function count_to_ten() {
        var Digit = "";
        var X = 1;
        while (X < 11) {
            Digit += "<br>" + X;
            X++;
        }
        document.getElementById("Counting_to_Ten").innerHTML = Digit;
    }

</script>
</body>

</html>
