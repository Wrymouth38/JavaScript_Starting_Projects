<body>
   
<p id="Counting_to_Ten"></p>
<button onclick="Counting_to_Ten()">Click to Count to Ten</button>

<script>
    function count_to_ten() {
        var Digit = "";
        var X = 1;
        while (X < 11) {
            Digit += "<br>" + X;
            X++;
        }
    }
</script>
